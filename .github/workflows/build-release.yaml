name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  BINARY_NAME: Plugalyzer
  BUILD_TYPE: Release
  BUILD_DIR: build
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Plugalyzer Build
    strategy:
      matrix:
        include:
          - name: Linux
            os: ubuntu-24.04
            release_zip: plugalyzer-linux.zip
            release_bin: Plugalyzer
          - name: macOS
            os: macos-latest
            release_zip: plugalyzer-mac.zip
            release_bin: Plugalyzer
          - name: Windows
            os: windows-latest
            release_zip: plugalyzer-win.zip
            release_bin: Plugalyzer.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            juce-

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            apt-${{ runner.os }}-

      - name: Install JUCE dependencies (Ubuntu)
        if: ${{ matrix.name == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libjack-jackd2-dev \
            ladspa-sdk \
            libcurl4-openssl-dev  \
            libfreetype-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libwebkit2gtk-4.1-dev \
            libglu1-mesa-dev \
            mesa-common-dev
      
      - name: Setup Environment Variables
        shell: bash
        run: |
          echo "APP_DIR=${{ env.BUILD_DIR }}/${{ env.BINARY_NAME }}_artefacts/${{ env.BUILD_TYPE }}" >> $GITHUB_ENV
          echo "ZIP_FILE_NAME=${{ env.BINARY_NAME }}_${{ matrix.name }}.zip" >> $GITHUB_ENV

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: v3-${{ matrix.name }}-${{ env.BUILD_TYPE }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B ${{ env.BUILD_DIR }} -G "Visual Studio 17 2022" -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

      - name: Configure CMake (Mac)
        if: runner.os == 'macOS'
        run: cmake -B ${{ env.BUILD_DIR }} -G Xcode -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
            
      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -B ${{ env.BUILD_DIR }} -G "Ninja Multi-Config" -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER=g++-14

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

      - name: Create zip files
        working-directory: ${{ env.APP_DIR }}
        run: 7z a -aoa -tzip ${{ env.ZIP_FILE_NAME }} ${{ matrix.app }}
      
      - name: Upload zip files
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.ZIP_FILE_NAME }}
          path: ${{ env.APP_DIR }}/${{ env.ZIP_FILE_NAME }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Get Artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Plugalyzer_macOS.zip/*
            Plugalyzer_Windows.zip/*
            Plugalyzer_Linux.zip/*